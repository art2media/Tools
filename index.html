<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>art2media Tools</title>
<style>
  :root{ --bg:#f4f5f7; --card:#fff; --ink:#1c2024; --muted:#6b7280; --line:#e3e6ea; --accent:#2f6fed; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15171b; --card:#1e2127; --ink:#e7e9ec; --muted:#9aa3af; --line:#2c313a; --accent:#5b8dff; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:720px;margin:0 auto;padding:48px 20px 80px}
  h1{font-size:28px;margin:0 0 6px}
  .sub{color:var(--muted);margin:0 0 32px}
  .tool{display:block;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:12px;
    transition:border-color .15s}
  .tool:hover{border-color:var(--accent)}
  .tool .name{font-weight:600;font-size:17px;color:var(--accent)}
  .tool .desc{color:var(--muted);font-size:14px;margin-top:3px}
  code{background:var(--line);padding:1px 5px;border-radius:5px;font-size:.9em}
</style>
</head>
<body>
<main class="wrap">
  <h1>art2media Tools</h1>
  <p class="sub">Interne Web-Tools.</p>

  <a class="tool" href="shopify-galerie/">
    <div class="name">Shopify Galerie Konfigurator</div>
    <div class="desc">Erzeugt und pflegt den <code>_Galerie</code>-String für die Galerie-Steuerung je Produktoption.</div>
  </a>
</main>
</body>
</html>
